<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>shop wisaitadn</title>

    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <iframe id="myIframe"></iframe>

    <script>
        // อ่านค่า shop จาก URL
        const urlParams = new URLSearchParams(window.location.search);
        const shopValue = urlParams.get("shop");

        // URL ของ Google Apps Script
        let scriptUrl = "https://script.google.com/macros/s/AKfycbywlIYXl8o1gTWrQeVcRIOECv5QYl6phBg9ysfOScysIXaB2uil7BIfv92lTIEbPAmZng/exec";

        // ถ้ามีค่า shop ให้ต่อท้าย URL
        if (shopValue) {
            scriptUrl += "?shop=" + shopValue;
        }

        // โหลด Apps Script ลงใน iframe
        document.getElementById("myIframe").src = scriptUrl;
    </script>

</body>

</html>
