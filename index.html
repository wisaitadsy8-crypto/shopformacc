<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>

<script>
const urlParams = new URLSearchParams(window.location.search);
const shopValue = urlParams.get("shop");

let scriptUrl = "https://script.google.com/macros/s/AKfycbywlIYXl8o1gTWrQeVcRIOECv5QYl6phBg9ysfOScysIXaB2uil7BIfv92lTIEbPAmZng/exec";

if (shopValue) {
    scriptUrl += "?shop=" + encodeURIComponent(shopValue);
}

window.location.replace(scriptUrl);
</script>

</body>
</html>
